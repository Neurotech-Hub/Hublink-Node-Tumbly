name=Hublink-Node-Tumbly
version=0.1.0
author=Matt Gaidica <gaidica@wustl.edu>
maintainer=Matt Gaidica <gaidica@wustl.edu>
sentence=Hardware API for Hublink Node Tumbly ESP32-S3: sensors, SD, CSV logging, buttons, servo, and meta tools.
paragraph=Provides a fixed pin map and services for DS3231 (RTC), MAX17048 (fuel gauge), VEML7700 light, BME680 environment, SD over SPI, ULP-assisted magnet pulse counting on deep sleep, three debounced buttons with interrupt support, a 5V-gated servo driver, and the on-board HS96L03W2C03 128x64 SSD1306 OLED at I2C address 0x3C. Includes DataLoggerHelper for masked CSV rows, MetaConfigEditor (USB serial meta.json and SD file shell with optional live sensor snapshots), millis-based safeguard: bool automatic or manual isCellBelowTripVoltage + safeguardShutdown; DataLoggerHelper runs automatic after I2C, and LoggerWorkflow helpers. Target board: ESP32-S3 variants used by Hublink Node Tumbly hardware.
category=Device Control
url=https://github.com/Neurotech-Hub/Hublink-Node-Tumbly
architectures=esp32
includes=HublinkNodeTumbly.h
depends=RTClib,Adafruit MAX1704X,Adafruit BusIO,Adafruit VEML7700 Library,Adafruit BME680 Library,Adafruit GFX Library,Adafruit SSD1306,ArduinoJson,ESP32Servo
